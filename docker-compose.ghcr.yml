name: news-media-tracker

services:
  app:
    image: ${APP_IMAGE:-ghcr.io/wits-research-office-development/news-media-tracker:latest}
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3000}
    restart: unless-stopped
