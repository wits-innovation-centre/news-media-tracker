name: homicide-media-tracker

x-workspace-common: &workspace-common
  build:
    context: .
    dockerfile: .devcontainer/Dockerfile
  command: sleep infinity
  init: true
  user: vscode
  volumes:
    - .:/workspace:cached
    - /var/run/docker.sock:/var/run/docker.sock
  environment:
    ENV: dev
    WINEARCH: win64
    WINEPREFIX: /home/vscode/.wine
    DISPLAY: ${DISPLAY:-:99}
    ATOM_STACK_SERVICE: atom
    WORKBENCH_PLUGIN_API_BASE_URL: http://atom-host:8080/plugins/homicide-tracker/api

services:
  workspace-superproject:
    <<: *workspace-common
    working_dir: /workspace
    depends_on:
      workspace-app:
        condition: service_started
      workspace-service:
        condition: service_started

  workspace-app:
    <<: *workspace-common
    working_dir: /workspace/app.news-media-tracker
    ports:
      - "3000:3000"
      - "3001:3001"

  workspace-service:
    <<: *workspace-common
    working_dir: /workspace/srvc.atom

  atom-db:
    image: ${ATOM_DB_IMAGE:-mariadb:11.4.2}
    profiles: [atom-stack]
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${ATOM_DB_NAME:-atom}
      MARIADB_USER: ${ATOM_DB_USER:-atom}
      MARIADB_PASSWORD: ${ATOM_DB_PASSWORD:-REPLACE_WITH_SECURE_DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${ATOM_DB_ROOT_PASSWORD:-REPLACE_WITH_SECURE_ROOT_PASSWORD}
    ports:
      - "${ATOM_DB_PORT:-63306}:3306"
    volumes:
      - atom-db-data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mariadb-admin ping -h 127.0.0.1 -u$${MARIADB_USER} -p$${MARIADB_PASSWORD} --silent",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  atom-cache:
    image: ${ATOM_CACHE_IMAGE:-redis:7.4.2-alpine}
    profiles: [atom-stack]
    restart: unless-stopped
    ports:
      - "${ATOM_CACHE_PORT:-63790}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  atom:
    image: ${ATOM_APP_IMAGE:-qubit/atom:2.8.2}
    profiles: [atom-stack]
    restart: unless-stopped
    depends_on:
      atom-db:
        condition: service_healthy
      atom-cache:
        condition: service_healthy
    environment:
      ATOM_DB_HOST: atom-db
      ATOM_DB_NAME: ${ATOM_DB_NAME:-atom}
      ATOM_DB_USER: ${ATOM_DB_USER:-atom}
      ATOM_DB_PASSWORD: ${ATOM_DB_PASSWORD:-REPLACE_WITH_SECURE_DB_PASSWORD}
      ATOM_CACHE_HOST: atom-cache
      ATOM_CACHE_PORT: 6379

  atom-host:
    image: ${ATOM_HOST_IMAGE:-nginx:1.27.0-alpine}
    profiles: [atom-stack]
    restart: unless-stopped
    environment:
      ATOM_HOST_INTERNAL_PORT: ${ATOM_HOST_INTERNAL_PORT:-8080}
      ATOM_HOST_HEALTH_PATH: ${ATOM_HOST_HEALTH_PATH:-/healthz}
    depends_on:
      atom-db:
        condition: service_healthy
      atom-cache:
        condition: service_healthy
      atom:
        condition: service_started
    ports:
      - "${ATOM_HOST_PORT:-62080}:${ATOM_HOST_INTERNAL_PORT:-8080}"
    volumes:
      - ./srvc.atom/infrastructure/atom-stack/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O - \"http://127.0.0.1:$${ATOM_HOST_INTERNAL_PORT}$${ATOM_HOST_HEALTH_PATH}\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

volumes:
  atom-db-data:
