# News Media Tracker – Docker Compose stack
#
# Profiles:
#   external-server   – bring up the hosted sync target (sqld) and web app.
#                       One-command bring-up:
#                         docker compose --profile external-server up -d
#
# Required env vars – copy .env.example → .env and fill in before first run.
# See .env.example for the full list.

name: news-media-tracker

services:
  # ────────────────────────────────────────────────────────────────────────────
  # sqld
  #   LibSQL/sqld server – the persistent, network-accessible sync-target DB.
  #   The news media tracker app connects to this service as its remote sync
  #   endpoint.
  # ────────────────────────────────────────────────────────────────────────────
  sqld:
    image: ghcr.io/tursodatabase/libsql-server:latest
    profiles:
      - external-server
    ports:
      - "${SQLD_HTTP_PORT:-8080}:8080"
    environment:
      SQLD_NODE: primary
      SQLD_HTTP_LISTEN_ADDR: 0.0.0.0:8080
      # Set SQLD_AUTH_JWT_KEY in .env to enable bearer-token auth.
      # ⚠️  WARNING: leaving this empty disables auth entirely. Only acceptable
      # for local development or private, firewalled networks. Always set a key
      # before exposing sqld on a public network.
      SQLD_AUTH_JWT_KEY: ${SQLD_AUTH_JWT_KEY:-}
    volumes:
      - sqld-data:/var/lib/sqld
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ────────────────────────────────────────────────────────────────────────────
  # app
  #   Next.js web server – full hosted deployment of the tracker UI and API.
  #   After startup, open Settings → Sync and set the remote URL to the sqld
  #   endpoint: http://<host>:${SQLD_HTTP_PORT:-8080}
  # ────────────────────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    profiles:
      - external-server
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3000}
      # Tell pnpm where the shared content-addressable store lives so that
      # all Node app services use the same cache volume and avoid redundant
      # downloads across container restarts.
      npm_config_store_dir: /pnpm/store
    volumes:
      # Persist local SQLite data written by the server-side DB manager.
      - app-data:/app/data
      # Shared pnpm content-addressable store – mounted read/write so that
      # `pnpm install` inside the container populates a persistent cache.
      # Using a named volume (not a bind-mount) is the permission-safe
      # strategy for containerised dev: Docker initialises the directory
      # with root ownership on first creation, avoiding host UID/GID
      # conflicts that bind-mounts would introduce.
      - pnpm-store:/pnpm/store
    depends_on:
      sqld:
        condition: service_healthy
    restart: unless-stopped

# ──────────────────────────────────────────────────────────────────────────────
# Named volumes – provide durable persistence across container restarts.
# Run `docker volume inspect news-media-tracker_sqld-data` to find the host path.
# ──────────────────────────────────────────────────────────────────────────────
volumes:
  sqld-data:
    driver: local
    labels:
      news-media-tracker.role: sqld-persistent-store
  app-data:
    driver: local
    labels:
      news-media-tracker.role: app-data-store
  # Shared pnpm content-addressable store.
  # Declared once at the compose level so multiple Node app services can
  # mount it without each container downloading packages independently.
  # Permission-safe: Docker creates the named-volume directory on first use
  # with root ownership, which matches the default node image user and
  # avoids host UID/GID conflicts inherent in bind-mount approaches.
  pnpm-store:
    driver: local
    labels:
      news-media-tracker.role: pnpm-content-store
