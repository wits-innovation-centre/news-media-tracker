name: homicide-media-tracker

x-workspace-common: &workspace-common
  build:
    context: .
    dockerfile: .devcontainer/Dockerfile
  command: sleep infinity
  init: true
  user: vscode
  volumes:
    - .:/workspace:cached
    - /var/run/docker.sock:/var/run/docker.sock
  environment:
    ENV: dev
    WINEARCH: win64
    WINEPREFIX: /home/vscode/.wine
    DISPLAY: ${DISPLAY:-:99}
    ATOM_STACK_SERVICE: atom
    WORKBENCH_PLUGIN_API_BASE_URL: http://atom-host:8080/plugins/homicide-tracker/api

services:
  workspace-superproject:
    <<: *workspace-common
    working_dir: /workspace
    depends_on:
      workspace-app:
        condition: service_started
      workspace-service:
        condition: service_started

  workspace-app:
    <<: *workspace-common
    working_dir: /workspace/app.news-media-tracker
    ports:
      - "3000:3000"
      - "3001:3001"

  workspace-service:
    <<: *workspace-common
    working_dir: /workspace/srvc.atom

  atom-db:
    image: ${ATOM_DB_IMAGE:-mariadb:10.11}
    profiles: [atom-stack]
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${ATOM_DB_NAME:-atom}
      MARIADB_USER: ${ATOM_DB_USER:-atom}
      MARIADB_PASSWORD: ${ATOM_DB_PASSWORD:-REPLACE_WITH_SECURE_DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${ATOM_DB_ROOT_PASSWORD:-REPLACE_WITH_SECURE_ROOT_PASSWORD}
    ports:
      - "${ATOM_DB_PORT:-63306}:3306"
    volumes:
      - atom-db-data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mariadb-admin ping -h 127.0.0.1 -u$${MARIADB_USER} -p$${MARIADB_PASSWORD} --silent",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  memcached:
    image: ${ATOM_MEMCACHED_IMAGE:-memcached:latest}
    profiles: [atom-stack]
    restart: unless-stopped
    command: -p 11211 -m 128 -u memcache
    ports:
      - "${ATOM_MEMCACHED_PORT:-63004}:11211"
    healthcheck:
      test: ["NONE"]

  gearmand:
    image: ${ATOM_GEARMAND_IMAGE:-artefactual/gearmand}
    profiles: [atom-stack]
    restart: unless-stopped
    ports:
      - "${ATOM_GEARMAND_PORT:-63005}:4730"

  elasticsearch:
    image: ${ATOM_ELASTICSEARCH_IMAGE:-docker.elastic.co/elasticsearch/elasticsearch-oss:7.10.2}
    profiles: [atom-stack]
    restart: unless-stopped
    environment:
      bootstrap.memory_lock: "true"
      cluster.routing.allocation.disk.threshold_enabled: "false"
      discovery.type: single-node
      ES_JAVA_OPTS: ${ATOM_ES_JAVA_OPTS:--Xms640m -Xmx640m}
      bootstrap.system_call_filter: "false"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "${ATOM_ELASTICSEARCH_PORT:-63002}:9200"
    volumes:
      - atom-elasticsearch-data:/usr/share/elasticsearch/data

  atom:
    build:
      context: ${ATOM_APP_BUILD_CONTEXT:-https://github.com/artefactual/atom.git#stable/2.10.x}
      dockerfile: ${ATOM_APP_DOCKERFILE:-Dockerfile}
    profiles: [atom-stack]
    restart: unless-stopped
    depends_on:
      atom-db:
        condition: service_healthy
      memcached:
        condition: service_started
      gearmand:
        condition: service_started
      elasticsearch:
        condition: service_started
    environment:
      ATOM_DEVELOPMENT_MODE: on
      ATOM_ELASTICSEARCH_HOST: elasticsearch
      ATOM_MEMCACHED_HOST: memcached
      ATOM_GEARMAND_HOST: gearmand
      ATOM_MYSQL_DSN: mysql:host=atom-db;port=3306;dbname=${ATOM_DB_NAME:-atom};charset=utf8mb4
      ATOM_MYSQL_USERNAME: ${ATOM_DB_USER:-atom}
      ATOM_MYSQL_PASSWORD: ${ATOM_DB_PASSWORD:-REPLACE_WITH_SECURE_DB_PASSWORD}
      NODE_ENV: development
    entrypoint:
      - /bin/sh
      - -lc
    command:
      - |
        printf 'memory_limit = 1024M\n' > /usr/local/etc/php/conf.d/zz-memory-limit.ini
        exec /atom/src/docker/entrypoint.sh fpm
    volumes:
      - atom-src:/atom/src

  atom_worker:
    build:
      context: ${ATOM_APP_BUILD_CONTEXT:-https://github.com/artefactual/atom.git#stable/2.10.x}
      dockerfile: ${ATOM_APP_DOCKERFILE:-Dockerfile}
    image: ${ATOM_WORKER_BUILT_IMAGE:-homicide-media-tracker-atom-worker:local}
    profiles: [atom-stack]
    restart: on-failure:5
    depends_on:
      atom-db:
        condition: service_healthy
      memcached:
        condition: service_started
      gearmand:
        condition: service_started
      elasticsearch:
        condition: service_started
    environment:
      ATOM_DEVELOPMENT_MODE: on
      ATOM_ELASTICSEARCH_HOST: elasticsearch
      ATOM_MEMCACHED_HOST: memcached
      ATOM_GEARMAND_HOST: gearmand
      ATOM_MYSQL_DSN: mysql:host=atom-db;port=3306;dbname=${ATOM_DB_NAME:-atom};charset=utf8mb4
      ATOM_MYSQL_USERNAME: ${ATOM_DB_USER:-atom}
      ATOM_MYSQL_PASSWORD: ${ATOM_DB_PASSWORD:-REPLACE_WITH_SECURE_DB_PASSWORD}
      NODE_ENV: development
    entrypoint:
      - /bin/sh
      - -lc
    volumes:
      - atom-src:/atom/src
    command:
      - |
        printf 'memory_limit = 1024M\n' > /usr/local/etc/php/conf.d/zz-memory-limit.ini
        exec /atom/src/docker/entrypoint.sh worker

  atom-host:
    build:
      context: ./srvc.atom/infrastructure/atom-stack/nginx
      dockerfile: Dockerfile
      args:
        BASE_NGINX_IMAGE: ${ATOM_HOST_IMAGE:-nginx:1.27.0-alpine}
    image: ${ATOM_HOST_BUILT_IMAGE:-homicide-media-tracker-atom-host:local}
    profiles: [atom-stack]
    restart: unless-stopped
    environment:
      ATOM_HOST_INTERNAL_PORT: ${ATOM_HOST_INTERNAL_PORT:-8080}
      ATOM_HOST_HEALTH_PATH: ${ATOM_HOST_HEALTH_PATH:-/healthz}
    depends_on:
      atom-db:
        condition: service_healthy
      atom:
        condition: service_started
    ports:
      - "${ATOM_HOST_PORT:-62080}:${ATOM_HOST_INTERNAL_PORT:-8080}"
    volumes:
      - atom-src:/atom/src:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O - \"http://127.0.0.1:$${ATOM_HOST_INTERNAL_PORT}$${ATOM_HOST_HEALTH_PATH}\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

volumes:
  atom-db-data:
  atom-elasticsearch-data:
  atom-src:
