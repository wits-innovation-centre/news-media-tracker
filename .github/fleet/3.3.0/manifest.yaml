      Conductor startup gate FAIL — cross-repository PR to origin/Test
      (MaxB543/Homicide-tracker-MASTER) cannot be opened from this agent context.
      Final PR must be opened manually once all worker lanes are merged into
      phase/3.3.0 within the locked repository.

stopConditions:
  - id: repo-lock-mismatch
    triggered: true
    detail: >
      Actual repo (JulianVJacobs/Homicide-Media-Tracker) != contract repo
      (MaxB543/Homicide-tracker-MASTER). Cross-repo operations halted per
      startup gate protocol. Governance manifest created in owning repo only.
