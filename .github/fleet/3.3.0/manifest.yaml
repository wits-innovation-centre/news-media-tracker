stopConditions:
  - id: repo-lock-mismatch
    triggered: true
    detail: >
      Actual repo (JulianVJacobs/Homicide-Media-Tracker) != contract repo
      (MaxB543/Homicide-tracker-MASTER). Cross-repo operations halted per
      startup gate protocol. Governance manifest created in owning repo only.
