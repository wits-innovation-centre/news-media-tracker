      - id: unit-tests
        command: npm run test
        result: pass
        detail: "153 tests, 28 suites — all passing"
      - id: integrated-gates
        command: npm run verify.integrated
        result: pass
        detail: "29 tests, 1 suite — all passing (gates 1-8: stack-startup, bootstrap, plugin-route-health, host-shell-access, offline-queue, reconnect-drill, auth-compat, sw-queue-contract)"
  workerMergesCompleted: []
