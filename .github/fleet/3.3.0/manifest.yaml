  identity: "[3.3.0][00-conductor]"
  conductorBranch: copilot/phase-3-3-0-integration
  startupGate:
    repoLockContract: MaxB543/Homicide-tracker-MASTER
    actualRepo: JulianVJacobs/Homicide-Media-Tracker
    branchContract: phase/3.3.0
    actualBranch: copilot/phase-3-3-0-integration
    result: GATE-FAIL
    note: >
      The conductor prompt specifies repository MaxB543/Homicide-tracker-MASTER and
      branch phase/3.3.0. The agent is executing in JulianVJacobs/Homicide-Media-Tracker
      on branch copilot/phase-3-3-0-integration. Per the startup gate stop condition,
      cross-repository PR operations (worker merges, final PR to origin/Test in the
      locked repo) are not performed. Governance artifact (this manifest) is recorded
      in the owning repository only.

