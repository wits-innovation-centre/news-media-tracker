fleet:
  plannedVersion: 3.3.0
  phaseBranch: phase/3.3.0
  allowedChangeClass: minor
  mergePolicy: eager-after-green
  dependency: none

conductor:
  lane: "00"
  identity: "[3.3.0][00-conductor]"
  conductorBranch: copilot/phase-3-3-0-integration
  startupGate:
    repoLockContract: MaxB543/Homicide-tracker-MASTER
    actualRepo: JulianVJacobs/Homicide-Media-Tracker
    branchContract: phase/3.3.0
    actualBranch: copilot/phase-3-3-0-integration
    result: GATE-FAIL
    note: >
      The conductor prompt specifies repository MaxB543/Homicide-tracker-MASTER and
      branch phase/3.3.0. The agent is executing in JulianVJacobs/Homicide-Media-Tracker
      on branch copilot/phase-3-3-0-integration. Per the startup gate stop condition,
      cross-repository PR operations (worker merges, final PR to origin/Test in the
      locked repo) are not performed. Governance artifact (this manifest) is recorded
      in the owning repository only.

lanes:
  - id: "01"
    name: "[3.3.0][01-schema] feat(db): add repository, membership, and permission_grant schema primitives."
    branch: lane/3.3.0/01-schema
    targetBranch: phase/3.3.0
    readiness: merged
    blockers: []
    prMetadata:
      titlePrefix: "[3.3.0][01-schema]"
      prNumber: 66
      status: merged

  - id: "02"
    name: "[3.3.0][02-sharing-permissions] Implement invite/share and grant management APIs."
    branch: lane/3.3.0/02-sharing-permissions
    targetBranch: phase/3.3.0
    readiness: merged
    blockers: []
    prMetadata:
      titlePrefix: "[3.3.0][02-sharing-permissions]"
      prNumber: 67
      status: merged

  - id: "03"
    name: "[3.3.0][03-operation-log] Add operation-based mutation log and base-version checks."
