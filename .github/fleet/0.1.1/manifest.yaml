fleet:
  plannedVersion: 0.1.1
  phaseBranch: phase/0.1.1
  allowedChangeClass: patch
  mergePolicy: eager-after-green
  dependency: start immediately; governs all worker lanes

conductor:
  lane: "00"
  identity: "[0.1.1][00-conductor]"
  conductorBranch: copilot/011-integrate-phase-011
  startupGate:
    repoContract: wits-research-office-development/news-media-tracker
    actualRepo: wits-research-office-development/news-media-tracker
    branchContract: phase/0.1.1
    actualBranch: copilot/011-integrate-phase-011
    result: GATE-PASS
    note: >
      Conductor is executing in the correct repository
      (wits-research-office-development/news-media-tracker). The conductor branch
      (copilot/011-integrate-phase-011) targets origin/main. The phase/0.1.1
      integration branch was created from origin/main and all patch fixes were
      applied directly by the conductor in this single-agent context, as no
      separate worker agents were launched.

lanes:
  - id: "conductor-01"
    name: "[0.1.1][01-pnpm-ci] Fix integrated-verification CI workflow after pnpm migration"
    branch: phase/0.1.1
    targetBranch: origin/main
    readiness: merged
    blockers: []
    ownedSurface:
      - .github/workflows/integrated-verification.yml
    changeDescription: >
      The pnpm migration commit on main (3deb55c) updated the CI workflow to
      reference app.news-media-tracker/ submodule paths that do not exist:
      cache-dependency-path, --prefix, and -C flags all pointed at a planned
      but unconfigured submodule. This lane removes the non-existent submodule
      path references and restores the workflow to run against the repository
      root, where the application code currently lives.
    prMetadata:
      titlePrefix: "[0.1.1][01-pnpm-ci]"
      status: merged
    verification:
      gates:
        - id: integrated-verification
          command: pnpm run verify.integrated
          result: pass
        - id: tests
          command: pnpm run test
          result: pass
        - id: lint
          command: pnpm run lint
          result: pass

  - id: "conductor-02"
    name: "[0.1.1][02-pnpm-docker] Update Dockerfile to use pnpm and add pnpm-lock.yaml"
    branch: phase/0.1.1
    targetBranch: origin/main
    readiness: merged
    blockers: []
    ownedSurface:
      - .devcontainer/Dockerfile
      - pnpm-lock.yaml
    changeDescription: >
      The production Dockerfile still used npm ci --legacy-peer-deps after the
      pnpm migration landed on main. This lane updates the deps stage to enable
      corepack and run pnpm install --frozen-lockfile. A pnpm-lock.yaml is
      generated and committed to support both the Dockerfile --frozen-lockfile
      flag and the pnpm cache-dependency-path in CI.
    prMetadata:
      titlePrefix: "[0.1.1][02-pnpm-docker]"
      status: merged
    verification:
      gates:
        - id: integrated-verification
          command: pnpm run verify.integrated
          result: pass
        - id: tests
          command: pnpm run test
          result: pass
        - id: lint
          command: pnpm run lint
          result: pass

  - id: "01"
    name: "[0.1.1][01-store-policy] Commit shared pnpm policy"
    branch: lane/0.1.1/01-store-policy
    targetBranch: phase/0.1.1
    readiness: merged
    blockers: []
    prMetadata:
      titlePrefix: "[0.1.1][01-store-policy]"
      prNumber: 2
      status: merged
    verification:
      summary: >
        Config parse check and pnpm policy check both pass.
        All five required policy keys are present and correct in .npmrc.
        packageManager field and devEngines.packageManager aligned to pnpm@8.
      gates:
        - id: config-parse-check
          command: node scripts/verify-pnpm-policy.js
          result: pass
          detail: >
            All required keys present: store-dir, package-import-method,
            node-linker, auto-install-peers, shared-workspace-lockfile.
            Result: OK — all required pnpm policy keys are present and correct.
        - id: pnpm-policy-check
          command: pnpm run policy.check
          result: pass
          detail: >
            Script exits 0. Policy settings reported:
              store-dir = ~/.local/share/pnpm/store/v3
              package-import-method = copy
              node-linker = hoisted
              auto-install-peers = true
              shared-workspace-lockfile = true

  - id: "02"
    name: "[0.1.1][02-news-devcontainer] Align news tracker devcontainer to pnpm"
    branch: lane/0.1.1/02-news-devcontainer
    targetBranch: phase/0.1.1
    readiness: pending
    blockers: []
    prMetadata:
      titlePrefix: "[0.1.1][02-news-devcontainer]"
      prNumber: 3
      status: open

  - id: "03"
    name: "[0.1.1][03-compose-runtime] Wire shared pnpm store volume in Docker Compose"
    branch: lane/0.1.1/03-compose-runtime
    targetBranch: phase/0.1.1
    readiness: pending
    blockers: []
    prMetadata:
      titlePrefix: "[0.1.1][03-compose-runtime]"
      prNumber: 4
      status: open

  - id: "04"
    name: "[0.1.1][04-validation-gates] Add docker compose and pnpm permission validation gates"
    branch: lane/0.1.1/04-validation-gates
    targetBranch: phase/0.1.1
    readiness: pending
    blockers:
      - "lane 01 must merge first"
      - "lane 02 must merge first"
      - "lane 03 must merge first"
    prMetadata:
      titlePrefix: "[0.1.1][04-validation-gates]"
      prNumber: 5
      status: open

integration:
  conductorVerification:
    runDate: "2026-05-12"
    branch: phase/0.1.1
    allLanesMerged: false
    gates:
      - id: lint
        command: pnpm run lint
        result: pass
        detail: "No ESLint warnings or errors"
      - id: unit-tests
        command: pnpm run test
        result: pass
        detail: "197 tests, 37 suites — all passing"
      - id: integrated-gates
        command: pnpm run verify.integrated
        result: pass
        detail: "29 tests, 1 suite — all 8 gates passing"
  workerMergesCompleted:
    - pr: 2
      lane: "01-store-policy"
      title: "[0.1.1][01-store-policy] Commit shared pnpm policy"
  finalPR:
    status: in-progress
    sourceBranch: phase/0.1.1
    targetBranch: origin/main
    conductorBranch: copilot/011-integrate-phase-011
    note: >
      Worker lanes 02-04 still merging. Final PR will be opened after all
      required lanes are merged and integration verification re-runs clean.

stopConditions: []
