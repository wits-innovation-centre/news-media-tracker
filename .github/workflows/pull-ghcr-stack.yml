name: pull-ghcr-stack

on:
  workflow_dispatch:
    inputs:
      stack_tag:
        description: Stack bundle tag to pull
        required: false
        default: latest

permissions:
  contents: read
  packages: read

jobs:
  pull-and-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull stack bundle image
        env:
          STACK_TAG: ${{ inputs.stack_tag }}
        run: |
          set -euo pipefail
          docker pull ghcr.io/${{ github.repository }}-stack:${STACK_TAG}

      - name: Extract stack files from bundle image
        env:
          STACK_TAG: ${{ inputs.stack_tag }}
        run: |
          set -euo pipefail
          mkdir -p .ghcr/_stack
          container_id=$(docker create ghcr.io/${{ github.repository }}-stack:${STACK_TAG})
          docker cp "${container_id}:/stack/docker-compose.yml" .ghcr/_stack/docker-compose.yml
          docker cp "${container_id}:/stack/.env.example" .ghcr/_stack/.env.example
          docker rm "${container_id}"

      - name: Write runtime env file for compose
        run: |
          set -euo pipefail
          cat > .ghcr/_stack/.env <<EOF
          APP_IMAGE=${{ vars.APP_IMAGE || format('ghcr.io/{0}:latest', github.repository) }}
          SQLD_HTTP_PORT=${{ vars.SQLD_HTTP_PORT || '8080' }}
          APP_PORT=${{ vars.APP_PORT || '3000' }}
          NEXT_PUBLIC_API_BASE_URL=${{ vars.NEXT_PUBLIC_API_BASE_URL || 'http://localhost:3000' }}
          SQLD_AUTH_JWT_KEY=${{ secrets.SQLD_AUTH_JWT_KEY }}
          DATABASE_AUTH_TOKEN=${{ secrets.DATABASE_AUTH_TOKEN }}
          EOF

      - name: Compose pull and up
        run: |
          set -euo pipefail
          docker compose -f .ghcr/_stack/docker-compose.yml --env-file .ghcr/_stack/.env pull
          docker compose -f .ghcr/_stack/docker-compose.yml --env-file .ghcr/_stack/.env up -d

      - name: Compose ps
        run: docker compose -f .ghcr/_stack/docker-compose.yml --env-file .ghcr/_stack/.env ps
