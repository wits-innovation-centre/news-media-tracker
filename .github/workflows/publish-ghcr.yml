name: publish-ghcr

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

env:
  NEXT_PUBLIC_BASE_PATH: ${{ vars.NEXT_PUBLIC_BASE_PATH || '/homicidetracker' }}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read package version
        id: package
        shell: bash
        run: |
          set -euo pipefail
          version=$(node -p "require('./package.json').version")
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest
            type=raw,value=${{ steps.package.outputs.version }}

      - name: Extract stack bundle metadata
        id: meta-stack
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}-stack
          tags: |
            type=ref,event=tag
            type=raw,value=latest
            type=raw,value=${{ steps.package.outputs.version }}

      - name: Build image for healthcheck
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .ghcr/Dockerfile
          target: runner
          push: false
          load: true
          tags: nmt-healthcheck:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_BASE_PATH=${{ env.NEXT_PUBLIC_BASE_PATH }}
          cache-from: type=gha

      - name: Smoke test container health endpoint
        shell: bash
        run: |
          set -euo pipefail

          base_path="${NEXT_PUBLIC_BASE_PATH}"
          if [ "$base_path" = "/" ]; then
            base_path=""
          fi

          docker run -d --name nmt-healthcheck -p 3000:3000 nmt-healthcheck:${{ github.sha }}

          cleanup() {
            docker logs nmt-healthcheck || true
            docker rm -f nmt-healthcheck || true
          }
          trap cleanup EXIT

          for attempt in {1..45}; do
            if curl -fsS "http://127.0.0.1:3000${base_path}/api/health" | grep -q '"status":"healthy"'; then
              echo "Healthcheck passed on attempt ${attempt}."
              exit 0
            fi
            sleep 2
          done

          echo "Healthcheck failed: /api/health did not report healthy in time."
          exit 1

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .ghcr/Dockerfile
          target: runner
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_BASE_PATH=${{ env.NEXT_PUBLIC_BASE_PATH }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push stack bundle image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .ghcr/stack.Dockerfile
          push: true
          tags: ${{ steps.meta-stack.outputs.tags }}
          labels: ${{ steps.meta-stack.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
