name: integrated-verification

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  integrated-verification:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: app.news-media-tracker/pnpm-lock.yaml

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install app dependencies
        run: pnpm --prefix app.news-media-tracker install

      - name: Run integrated verification gate
        run: pnpm -C app.news-media-tracker run verify.integrated
