name: integrated-verification

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  integrated-verification:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: pnpm install

      - name: Run integrated verification gate
        run: pnpm run verify.integrated
