services:
  pkg.db.libsql:
    image: ghcr.io/tursodatabase/libsql-server:latest
    pull_policy: always
    ports:
      - "${SQLD_HTTP_PORT:-8080}:8080"
    environment:
      SQLD_NODE: primary
      SQLD_HTTP_LISTEN_ADDR: 0.0.0.0:8080
      SQLD_AUTH_JWT_KEY: ${SQLD_AUTH_JWT_KEY:-}
    volumes:
      - sqld-data:/var/lib/sqld
    restart: unless-stopped
    networks:
      - app.news-media-tracker_net

  app.news-media-tracker:
    image: ${APP_IMAGE:-ghcr.io/wits-research-office-development/news-media-tracker:latest}
    pull_policy: always
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3000}
      DATABASE_AUTH_TOKEN: ${DATABASE_AUTH_TOKEN:-}
    volumes:
      - app-data:/app/data
    depends_on:
      sqld:
        condition: service_started
    restart: unless-stopped
    networks:
      - app.news-media-tracker_net

volumes:
  sqld-data:
    driver: local
  app-data:
    driver: local

networks:
  app.news-media-tracker_net:
    driver: bridge